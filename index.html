<style>
  :root{
    --navy:#162447;
    --marigold:#f5a623;
    --coral:#ff6363;
    --moss:#2f6b4f;
    --paper:#faf6ef;
    --ink:#232323;
    --muted:#6b6b6b;
    --line: rgba(22,36,71,0.14);
    --radius: 3px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
body{
  background:
    linear-gradient(rgba(250,246,239,0.85), rgba(250,246,239,0.85)),
    url("assets/background.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  background-repeat: no-repeat;

  color: var(--ink);
  font-family:'Lora', serif;
  line-height:1.6;
}
  h1,h2,h3,.display{ font-family:'Space Grotesk', sans-serif; letter-spacing:-0.01em; }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.03em; text-transform:uppercase; font-size:0.72rem; }
  button{ font-family:inherit; cursor:pointer; }
  a{color:inherit;}
  img{max-width:100%; display:block;}
  :focus-visible{ outline:2px solid var(--navy); outline-offset:2px; }

  .wrap{max-width:1080px; margin:0 auto; padding:0 24px;}

  /* ---------- TOPBAR ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    background:rgba(250,246,239,0.94); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    display:flex; align-items:center; gap:14px;
    padding:16px 24px; max-width:1080px; margin:0 auto;
  }
  .brand{ font-weight:700; font-size:1.05rem; color:var(--navy); white-space:nowrap; }
  .brand span{color:var(--coral);}
  .back-btn{
    display:none; align-items:center; gap:8px;
    background:none; border:1px solid var(--navy); color:var(--navy);
    padding:8px 14px; border-radius:999px; font-family:'IBM Plex Mono',monospace; font-size:0.75rem; text-transform:uppercase;
  }
  .back-btn.show{display:inline-flex;}
  .crumb{ font-size:0.8rem; color:var(--muted); font-family:'IBM Plex Mono',monospace; }

  main{min-height:calc(100vh - 64px);}
  .screen{ padding:48px 0 80px; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- HOME ---------- */
  .home-hero{ margin-bottom:44px; }
  .home-hero .eyebrow{ color:var(--coral); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .home-hero .eyebrow::before{ content:''; width:24px; height:2px; background:var(--coral); display:inline-block; }
  .home-hero h1{ font-size:clamp(2rem, 5vw, 3.2rem); color:var(--navy); max-width:680px; }
  .home-hero p{ font-family:'Lora', serif; font-style:italic; color:var(--muted); max-width:520px; margin-top:16px; font-size:1.05rem; }

  .category-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:22px; }
  .cat-card{
    background:#fff; border:1px solid var(--line); text-align:left;
    padding:28px; display:flex; flex-direction:column; gap:14px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cat-card:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(22,36,71,0.08); }
  .cat-glyph{
    width:46px; height:46px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:0.85rem; color:#fff;
  }
  .cat-card h2{ font-size:1.25rem; color:var(--navy); }
  .cat-card p{ font-size:0.92rem; color:var(--muted); flex:1; }
  .cat-card .go{ font-family:'IBM Plex Mono',monospace; font-size:0.72rem; text-transform:uppercase; color:var(--navy); }

  /* ---------- PLATFORM PICKER ---------- */
  .platform-grid{ display:grid; grid-template-columns:repeat(4, 1fr); gap:18px; }
  .platform-card{
    background:#fff; border:1px solid var(--line); padding:24px 18px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .platform-card:hover{ border-color:var(--navy); }
  .p-glyph{
    width:44px; height:44px; border-radius:10px; background:var(--navy); color:#fff;
    display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:600;
  }
  .platform-card h3{ font-size:1rem; color:var(--navy); }
  .platform-card .count{ font-size:0.78rem; color:var(--muted); font-family:'IBM Plex Mono',monospace; }

  /* ---------- SECTION HEAD ---------- */
  .section-head{ display:flex; align-items:baseline; gap:14px; margin-bottom:32px; }
  .section-head h2{ font-size:1.7rem; color:var(--navy); }
  .section-head .rule{ flex:1; height:1px; background:var(--line); }

  /* ---------- POST PREVIEW GRID (signature element) ---------- */
  .post-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:24px; }
  .post-card{ background:#fff; border:1px solid var(--line); display:flex; flex-direction:column; }

.post-media{
    position:relative;
    width:100%;
    overflow:hidden;
    background:#f5f5f5;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Automatically assigned */
.post-media.ratio-4-5{
    aspect-ratio:4/5;
}

.post-media.ratio-2-3{
    aspect-ratio:2/3;
}

.post-media.ratio-16-9{
    aspect-ratio:16/9;
}

.post-media.ratio-9-16{
    aspect-ratio:9/16;
}

.post-media img,
.post-media video{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
}
  .post-media .arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:32px; height:32px; border-radius:50%; border:none;
    background:rgba(22,36,71,0.55); color:#fff; font-size:0.9rem;
    display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s;
  }
  .post-media:hover .arrow{opacity:1;}
  .arrow.prev{ left:8px; } .arrow.next{ right:8px; }
  .dots{ position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:5px; }
  .dot{ width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.55); }
  .dot.active{ background:#fff; width:14px; border-radius:3px; }
  .swipe-hint{
    position:absolute; top:10px; right:10px; background:rgba(22,36,71,0.55); color:#fff;
    font-family:'IBM Plex Mono',monospace; font-size:0.62rem; padding:3px 7px; border-radius:999px;
  }
  .post-info{ padding:16px 18px 20px; cursor:pointer; }
  .post-info .ptitle{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:0.98rem; color:var(--navy); margin-bottom:6px; }
  .post-info .pexcerpt{ font-size:0.85rem; color:var(--muted); }
  .post-tags{ margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .post-tags span{ font-family:'IBM Plex Mono',monospace; font-size:0.62rem; color:var(--coral); }

  .empty-card{
    grid-column:1/-1; border:1px dashed var(--line); padding:60px 20px; text-align:center; color:var(--muted);
  }
  .empty-card .plus{ font-family:'Space Grotesk',sans-serif; font-size:2rem; color:var(--marigold); margin-bottom:10px; }
  .empty-card h3{ color:var(--navy); font-size:1.05rem; margin-bottom:6px; }

  /* ---------- LIST CARDS (blogs / campaigns) ---------- */
  .list-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }
  .list-card{
    background:#fff; border:1px solid var(--line); display:flex; gap:0; flex-direction:column; text-align:left;
    overflow:hidden;
  }
  .list-cover{ aspect-ratio:16/9; background:
      repeating-linear-gradient(135deg, rgba(22,36,71,0.06) 0 12px, transparent 12px 24px), var(--paper);
      display:flex; align-items:center; justify-content:center; border-bottom:1px solid var(--line);
  }
  .list-cover img{ width:100%; height:100%; object-fit:cover; }
  .list-cover .plus{ font-family:'Space Grotesk',sans-serif; font-size:2rem; color:var(--navy); opacity:0.25; }
  .list-body{ padding:20px 22px 24px; }
  .list-body h3{ font-size:1.1rem; color:var(--navy); margin-bottom:8px; }
  .list-body p{ font-size:0.9rem; color:var(--muted); }
  .list-body .date{ font-family:'IBM Plex Mono',monospace; font-size:0.68rem; color:var(--muted); display:block; margin-top:12px; }

  /* ---------- DETAIL SCREEN (blog / campaign) ---------- */
  .detail-cover{
    aspect-ratio:21/9; background:
      repeating-linear-gradient(135deg, rgba(22,36,71,0.06) 0 12px, transparent 12px 24px), var(--paper);
    display:flex; align-items:center; justify-content:center; margin-bottom:32px; border:1px solid var(--line);
  }
  .detail-cover img{ width:100%; height:100%; object-fit:cover; }
  .detail-cover .plus{ font-size:2.4rem; color:var(--navy); opacity:0.25; font-family:'Space Grotesk',sans-serif; }
  .detail-title{ font-size:2rem; color:var(--navy); max-width:800px; margin-bottom:10px; }
  .detail-meta{ font-family:'IBM Plex Mono',monospace; font-size:0.75rem; color:var(--muted); margin-bottom:28px; display:block; }
  .detail-body{ max-width:70ch; font-size:1.02rem; white-space:pre-line; }
  .detail-block{ margin-bottom:24px; }
  .detail-block h4{ font-family:'IBM Plex Mono',monospace; font-size:0.72rem; text-transform:uppercase; color:var(--coral); margin-bottom:8px; }
  .detail-tags{ display:flex; gap:10px; flex-wrap:wrap; margin-top:26px; }
  .detail-tags span{ font-family:'IBM Plex Mono',monospace; font-size:0.7rem; padding:6px 12px; border:1px solid var(--navy); border-radius:999px; color:var(--navy); }

  /* ---------- MODAL (post detail) ---------- */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(22,36,71,0.72);
    z-index:100; align-items:center; justify-content:center; padding:24px;
  }
  .modal-overlay.open{ display:flex; }
  .modal-card{
    background:#fff; max-width:920px; width:100%; max-height:90vh; overflow:auto;
    display:grid; grid-template-columns:1fr 1fr;
  }
  .modal-media{ position:relative; background:#111; aspect-ratio:1/1; user-select:none; }
  .modal-media img{ width:100%; height:100%; object-fit:cover; }
  .modal-arrow{
    position:absolute; top:50%; transform:translateY(-50%); width:38px; height:38px; border-radius:50%;
    border:none; background:rgba(255,255,255,0.85); color:var(--navy); font-size:1rem;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-arrow.prev{left:12px;} .modal-arrow.next{right:12px;}
  .modal-dots{ position:absolute; bottom:14px; left:0; right:0; display:flex; justify-content:center; gap:6px; }
  .modal-body{ padding:32px 30px; display:flex; flex-direction:column; }
  .modal-close{
    align-self:flex-end; background:none; border:none; font-size:1.3rem; color:var(--muted); line-height:1;
  }
  .modal-platform{ font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--coral); text-transform:uppercase; margin-bottom:10px; }
  .modal-body h3{ font-size:1.3rem; color:var(--navy); margin-bottom:12px; }
  .modal-body p.caption{ font-size:0.96rem; color:var(--ink); margin-bottom:16px; }
  .modal-date{ font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--muted); margin-top:auto; padding-top:16px; }

  @media (max-width:860px){
    .category-grid{grid-template-columns:1fr;}
    .platform-grid{grid-template-columns:repeat(2,1fr);}
    .post-grid{grid-template-columns:repeat(2,1fr);}
    .list-grid{grid-template-columns:1fr;}
    .modal-card{grid-template-columns:1fr;}
  }
  @media (max-width:520px){
    .post-grid{grid-template-columns:1fr;}
  }
</style>

function detectAspectRatios(){

    document.querySelectorAll(".post-media img.auto-ratio").forEach(img=>{

        if(img.dataset.checked) return;

        img.dataset.checked = "1";

        function applyRatio(){

            const w = img.naturalWidth;
            const h = img.naturalHeight;

            if(!w || !h) return;

            const ratio = w / h;
            const card = img.closest(".post-media");

            card.classList.remove(
                "ratio-4-5",
                "ratio-2-3",
                "ratio-16-9",
                "ratio-9-16"
            );

            if(Math.abs(ratio - (4/5)) < 0.05){

                card.classList.add("ratio-4-5");

            }else if(Math.abs(ratio - (2/3)) < 0.05){

                card.classList.add("ratio-2-3");

            }else if(Math.abs(ratio - (16/9)) < 0.05){

                card.classList.add("ratio-16-9");

            }else if(Math.abs(ratio - (9/16)) < 0.05){

                card.classList.add("ratio-9-16");

            }else{

                /* fallback */
                card.classList.add("ratio-4-5");

            }

        }

        if(img.complete){

            applyRatio();

        }else{

            img.onload = applyRatio;

        }

    });

}

/* ---------- MODAL ---------- */

function openModal(platformId, postId){
  const post = findPost(platformId, postId);
  modalState = { post, idx: cardIndex[post.id] || 0 };
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  modalState = null;
}
function renderModal(){

  if(!modalState) return;

  const {post,idx}=modalState;

  let media="";

  if(post.video){

    media=`
      <video
        src="${post.video}"
        controls
        autoplay
        muted
        loop
        playsinline
        style="width:100%;height:100%;object-fit:cover;background:#000;">
      </video>
    `;

  }else{

    const dots=post.images.map((_,i)=>`
      <span class="dot ${i===idx?'active':''}"></span>
    `).join('');

    media=`

      <img src="${post.images[idx]}">

      ${post.images.length>1?`

      <button class="modal-arrow prev"
              data-mdir="-1">&#8249;</button>

      <button class="modal-arrow next"
              data-mdir="1">&#8250;</button>

      <div class="modal-dots">${dots}</div>

      `:''}

    `;

  }

  document.getElementById("modalCard").innerHTML=`

    <div class="modal-media">
      ${media}
    </div>

    <div class="modal-body">

      <button class="modal-close"
              id="modalCloseBtn">&times;</button>

      <div class="modal-platform">
        ${findPlatformNameForPost(post)}
      </div>

      <h3>${post.title}</h3>

      <p class="caption">${post.caption}</p>

      <div class="detail-tags">
        ${post.tags.map(t=>`<span>${t}</span>`).join('')}
      </div>

      <div class="modal-date">${post.date}</div>

    </div>
  `;
}
function findPlatformNameForPost(post){
  for(const p of DATA.socialPlatforms){ if(p.posts.includes(post)) return p.name; }
  return '';
}

/* ---------- SWIPE HELPER ---------- */
function addSwipe(el, onPrev, onNext){
  let startX = null;
  el.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', e=>{
    if(startX===null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if(Math.abs(dx) > 40){ dx > 0 ? onPrev() : onNext(); }
    startX = null;
  }, {passive:true});
}

/* ---------- EVENT DELEGATION ---------- */

document.getElementById('backBtn').addEventListener('click', goBack);

document.getElementById('screenRoot').addEventListener('click', (e)=>{
  const goEl = e.target.closest('[data-go]');
  const arrowEl = e.target.closest('.arrow');
  const openEl = e.target.closest('[data-open-post]');

  if(arrowEl){
    e.stopPropagation();
    const media = arrowEl.closest('.post-media');
    const postId = media.dataset.postId, platformId = media.dataset.platformId;
    cyclePostImage(platformId, postId, parseInt(arrowEl.dataset.dir,10));
    return;
  }
  if(openEl){
    openModal(openEl.dataset.openPlatform, openEl.dataset.openPost);
    return;
  }
  if(goEl){
    go(JSON.parse(goEl.dataset.go));
  }
});

function cyclePostImage(platformId, postId, dir){
  const post = findPost(platformId, postId);
  if(post.video) return;
  const len = post.images.length;
  let idx = (cardIndex[postId] || 0) + dir;
  idx = ((idx % len) + len) % len;
  cardIndex[postId] = idx;
  const media = document.querySelector(`.post-media[data-post-id="${postId}"]`);
  media.querySelector('img').src = post.images[idx];
  media.querySelectorAll('.dot').forEach((d,i)=> d.classList.toggle('active', i===idx));
  const hint = media.querySelector('.swipe-hint');
  if(hint) hint.textContent = `${idx+1}/${len}`;
  addSwipe(media, ()=>cyclePostImage(platformId,postId,-1), ()=>cyclePostImage(platformId,postId,1));
}

// attach swipe to post-media elements after each render
const rootObserver = new MutationObserver(()=>{
  document.querySelectorAll('.post-media').forEach(media=>{
    if(media.dataset.swipeBound) return;
    media.dataset.swipeBound = '1';
    const { postId, platformId } = media.dataset;
    addSwipe(media, ()=>cyclePostImage(platformId,postId,-1), ()=>cyclePostImage(platformId,postId,1));
  });
});
rootObserver.observe(document.getElementById('screenRoot'), {childList:true, subtree:true});

document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modalOverlay') closeModal();
  const closeBtn = e.target.closest('#modalCloseBtn');
  if(closeBtn) closeModal();
  const mArrow = e.target.closest('.modal-arrow');
  if(mArrow){
    const dir = parseInt(mArrow.dataset.mdir,10);
    const len = modalState.post.images.length;
    modalState.idx = ((modalState.idx + dir) % len + len) % len;
    renderModal();
  }
});
document.addEventListener('keydown', (e)=>{
  if(!document.getElementById('modalOverlay').classList.contains('open')) return;
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowLeft'){ const len=modalState.post.images.length; modalState.idx=((modalState.idx-1)%len+len)%len; renderModal(); }
  if(e.key==='ArrowRight'){ const len=modalState.post.images.length; modalState.idx=((modalState.idx+1)%len+len)%len; renderModal(); }
});
document.getElementById('modalOverlay').addEventListener('touchstart', (e)=>{
  document.getElementById('modalOverlay').dataset.startX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('modalOverlay').addEventListener('touchend', (e)=>{
  const startX = parseFloat(document.getElementById('modalOverlay').dataset.startX);
  const dx = e.changedTouches[0].clientX - startX;
  if(Math.abs(dx) > 40 && modalState){
    const len = modalState.post.images.length;
    const dir = dx > 0 ? -1 : 1;
    modalState.idx = ((modalState.idx + dir) % len + len) % len;
    renderModal();
  }
}, {passive:true});

render();
</script>
